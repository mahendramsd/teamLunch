version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: team_lunch_db
    environment:
      MYSQL_DATABASE: team_lunch
      MYSQL_USER: user
      MYSQL_PASSWORD: 123456
      MYSQL_ROOT_PASSWORD: root123456
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: team_lunch_adminer
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=db
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: ./team-lunch-api
      dockerfile: Dockerfile
    container_name: team_lunch_api
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=team_lunch
      - DB_USER=user
      - DB_PASSWORD=123456
      - JWT_SECRET=thisisthesecretkeyforjwttokenandshouldbe32chars
      - JWT_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRES_IN=7d
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=http://localhost:3001/auth/google/callback
      - FRONTEND_URL=http://localhost:3000
      - API_URL=http://localhost:3001
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USER=${MAIL_USER}
      - MAIL_PASS=${MAIL_PASS}
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: ./team-lunch-app
      dockerfile: Dockerfile
    container_name: team_lunch_app
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:3001
    depends_on:
      - api

volumes:
  db_data:
